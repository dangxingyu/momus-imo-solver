# Momus Agent Configuration - Gemini 2.5 Pro via Native Gemini API
# For independent reproducibility runs on ProofBench
# Uses gemini-2.5-pro-native which routes to native Gemini API (not OpenRouter)

roles:
  solver:
    model: gemini-2.5-pro-native
    params:
      temperature: 0.6
      max_tokens: 65536
      thinking_budget: 32768

  grader:
    model: gemini-2.5-pro-native
    params:
      temperature: 0.1
      max_tokens: 65536
      thinking_budget: 32768

  conjecture_extractor:
    model: gemini-2.5-pro-native
    params:
      temperature: 0.3
      max_tokens: 65536
      thinking_budget: 32768

  parser:
    model: gemini-2.5-pro-native
    params:
      temperature: 0.1
      max_tokens: 32768
      thinking_budget: 16384

  quality_checker:
    model: gemini-2.5-flash-native
    params:
      temperature: 0.0
      max_tokens: 8192

  answer_processor:
    model: gemini-2.5-flash-native
    params:
      temperature: 0.0
      max_tokens: 16384

  conjecture_parser:
    model: gemini-2.5-flash-native
    params:
      temperature: 0.0
      max_tokens: 16384

execution:
  num_parallel_solvers: 4
  max_solver_grader_rounds: 2
  min_grade_for_phase2: 5

  num_top_solutions: 2
  max_verification_rounds: 1
  conjecture_grade_threshold: 5

  num_final_parallel_solvers: 5

  max_outer_loops: 3

  success_threshold: 7
  rule2_verification_count: 3
  enable_answer_processor: false
  feedback_mode: "areas_and_scaffolding"

  enable_post_enhancement: true
  post_enhancement_trigger_count: 3
  post_enhancement_min_grade: 1
  min_solutions_at_target: 3
  target_grade: 6
  num_rewriters: 2
  conjecture_proven_threshold: 6
  num_final_solvers: 3

retry:
  max_retries: 5
  base_delay: 1.0
  exponential_backoff: true

logging:
  verbose: true
  log_api_requests: true
  log_sessions: true
  log_conjecture_extraction: true
  log_verification: true
