# ProofAutoGrader Configuration
# Dedicated config for proof-level 0-7 grading.

roles:
  grader:
    model: gemini-2.5-pro-native
    params:
      temperature: 0.1
      max_tokens: 65536
      thinking_budget: 32768

# Included for consistent logging output from BaseAgent.
execution:
  score_scale: "0-7"

retry:
  max_retries: 5
  base_delay: 1.0
  exponential_backoff: true

logging:
  verbose: true
  log_api_requests: true
  log_sessions: true
  log_conjecture_extraction: false
  log_verification: false
